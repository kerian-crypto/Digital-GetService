{% extends 'admin/base.html' %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-4">
        <div class="admin-card">
            <h3>Nouveau membre propos</h3>
            <form method="post" class="vstack gap-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="action" value="create">
                <input class="form-control" type="text" name="nom" placeholder="Nom" required>
                <textarea class="form-control" name="description" rows="3" placeholder="Description"></textarea>
                <input class="form-control" type="text" name="icon" placeholder="Classe icone (ex: ri-user-star-line)">
                <button class="btn btn-primary" type="submit">Ajouter</button>
            </form>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="admin-card">
            <h3>Membres propos existants</h3>
            <div class="vstack gap-2">
                {% for m in membres %}
                <form method="post" class="admin-inline-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="id" value="{{ m.id }}">
                    <input class="form-control" type="text" name="nom" value="{{ m.nom }}" required>
                    <textarea class="form-control" name="description" rows="2">{{ m.description }}</textarea>
                    <input class="form-control" type="text" name="icon" value="{{ m.icon or '' }}">
                    <button class="btn btn-outline-primary" type="submit" name="action" value="update">Sauver</button>
                    <button class="btn btn-outline-warning" type="submit" name="action" value="toggle">Activer/Desactiver</button>
                    <button class="btn btn-outline-danger" type="submit" name="action" value="delete" onclick="return confirm('Supprimer ce membre ?');">Supprimer</button>
                </form>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
